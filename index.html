<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragline — Korean Heavy Equipment</title>
  <meta name="description" content="Used excavators, parts and heavy machinery from South Korea. Shipping to Uzbekistan, Kyrgyzstan and CIS countries.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header__inner">
    <a href="index.html" class="logo">
      <i class="logo__icon">⚙</i>
      <span class="logo__text">Dragline</span>
    </a>
    <nav class="nav">
      <a href="index.html" class="nav__link nav__link--active" data-i18n="nav_catalog">Catalog</a>
      <a href="about.html" class="nav__link" data-i18n="nav_about">About</a>
    </nav>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="ko">KR</button>
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn active" data-lang="en">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero__inner">
      <h1 class="hero__title"><em>Dragline</em> — <span data-i18n="tagline">Used heavy equipment from Korea</span></h1>
      <p class="hero__sub" data-i18n="tagline">Used heavy equipment from Korea</p>
    </div>
  </section>

  <section class="filters">
    <div class="filters__inner">

      <div class="filter-group">
        <label for="filter-category" data-i18n="filter_category">Category</label>
        <select id="filter-category">
          <option value="" data-i18n="filter_all_categories">All categories</option>
          <option value="excavator"       data-i18n="filter_excavators">Excavators</option>
          <option value="parts"           data-i18n="filter_parts">Parts</option>
          <option value="other_machinery" data-i18n="filter_other">Other machinery</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-brand" data-i18n="filter_brand">Brand</label>
        <select id="filter-brand">
          <option value="" data-i18n="filter_all_brands">All brands</option>
        </select>
      </div>

      <div class="filter-group" style="min-width:200px;flex:1.4">
        <label data-i18n="filter_price_label">Price (mln ₩)</label>
        <div class="filter-price-pair">
          <input type="number" id="filter-price-min" min="0" step="1"
                 data-i18n-placeholder="filter_price_from" placeholder="from">
          <span class="filter-price-sep">—</span>
          <input type="number" id="filter-price-max" min="0" step="1"
                 data-i18n-placeholder="filter_price_to" placeholder="to">
        </div>
      </div>

    </div>
  </section>

  <div class="results-bar">
    <span class="results-bar__count">
      <span data-i18n="filter_results">Found</span>: <strong id="results-count">0</strong>
    </span>
    <button class="btn--reset" id="filter-reset" data-i18n="filter_reset">Reset</button>
  </div>

  <div class="listings-wrap">
    <div class="listings-grid" id="listings-grid"></div>
    <div class="no-results" id="no-results">
      <div class="no-results__icon">🔍</div>
      <p data-i18n="no_results">Nothing found — try adjusting the filters</p>
    </div>
  </div>
</main>

<footer class="footer">
  <span data-i18n="footer_text">© 2025 Dragline. Used heavy equipment from Korea.</span>
</footer>

<script src="js/i18n.js"></script>
<script src="js/currency.js"></script>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
